<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">
<link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
<link rel="stylesheet" href="{{ "css/search.css" | relURL }}">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
{{ partial "schema.html" . }}
</head>
<body>
<a class="skip-link" href="#content">انتقل إلى المحتوى</a>
<header><div class="shell"><a class="brand" href="{{ "/" | relURL }}">AI Search Arab</a><nav aria-label="التنقل الرئيسي"><a href="{{ "/investigations/" | relURL }}">تحقيقات</a><a href="{{ "/toolkits/" | relURL }}">أدوات</a><a href="{{ "/methodology/" | relURL }}">المنهجية</a><a href="{{ "/search/" | relURL }}">بحث</a><a href="{{ "/corrections/" | relURL }}">التصحيحات</a></nav></div></header>
<main id="content">{{ block "main" . }}{{ end }}</main>
<footer><div class="shell"><p>© {{ now.Year }} AI Search Arab</p><p><a href="/privacy/">الخصوصية</a> · <a href="/terms/">الشروط</a> · <a href="/about/">عن المنصة</a></p></div></footer>
</body>
</html>
